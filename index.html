<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>전공 · 수학 과목 검색기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>📚 전공 · 수학 과목 검색기</h1>
        <p>전공별 권장 이수 과목과 수학 과목 정보를 빠르게 검색합니다.</p>

        <div class="tabs">
            <button id="majorTab" class="tab-btn active">🎓 전공 검색</button>
            <button id="subjectTab" class="tab-btn">📘 수학 과목 검색</button>
        </div>

        <div id="majorSection" class="section">
            <div class="search-box">
                <input id="majorInput" type="text" placeholder="예: 간호, 의사, 수의사, 산림, 천문">
                <button id="majorSearchBtn" class="search-btn">검색</button>
                <button id="majorResetBtn" class="reset-btn">초기화</button>
            </div>
        </div>

        <div id="subjectSection" class="section" style="display:none;">
            <div class="search-box">
                <input id="subjectInput" type="text" placeholder="예: 기하, 미적2, 확통, 인공지능수학">
                <button id="subjectSearchBtn" class="search-btn">검색</button>
                <button id="subjectResetBtn" class="reset-btn">초기화</button>
            </div>
        </div>

        <div id="result"></div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
